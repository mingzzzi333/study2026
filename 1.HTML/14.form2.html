<html>
    <head>
        <title>타이틀</title>
    </head>
    <body>
        <form method="GET" action ="login.html">
            <h1>로그인 창</h1>
           
            <input type="radio" name="과목" value="국어">국어
            <input type="radio" name="과목" value="수학">수학
            <input type="radio" name="과목" value="영어">영어
            <hr>
            <input type="radio" name="음료" value="option1">아메
            <input type="radio" name="음료" value="option2">라뗴
            <input type="radio" name="음료" value="option3">아이스티
            <hr>
            <input type="radio" name="음식">김밥
            <input type="radio" name="음식">떡볶이
            <input type="radio" name="음식">라면
            
            <h2>다중선택</h2>
            <input type="checkbox" name="음식">김밥
            <input type="checkbox" name="음식">떡볶이
            <input type="checkbox" name="음식">라면

            <input type="checkbox" name="음료" value="option1">아메
            <input type="checkbox" name="음료" value="option2">라뗴
            <input type="checkbox" name="음료" value="option3">아이스티

            <h2>풀다운 메뉴</h2>
            <select multiple>
                <option>사이다</option>
                <option>환타</option>
                <option>콜라</option>
                <option>우유</option>
                <option>초코우유</option>
                <option>딸기우유</option>
            </select>

            <h3>프로스레스바</h3>
            <progress value="40" max="100"></progress>40%<br>
            <progress value="60" max="100"></progress>60%<br>
            <progress value="80" max="100"></progress>80%<br>
        </form>
    </body>
</html>
