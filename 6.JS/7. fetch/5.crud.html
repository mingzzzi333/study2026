<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD 테스트</title>
</head>
<body>
    <h1>CRUD 테스트</h1>

    <input type="number" id="postId" placeholder="게시물 번호 (1~100)" min="1" max="100" />
    <br><br>

    <button id="getBtn">READ (GET)</button>
    <button id="postBtn">CREATE (POST)</button>
    <button id="putBtn">UPDATE (PUT)</button>
    <button id="deleteBtn">DELETE</button>

    <pre id="result">여기에 결과 표시</pre>

    <script>
        const result = document.getElementById('result');
        const getId = () => document.getElementById('postId').value;

        // ─── READ (GET) ───
        document.getElementById('getBtn').addEventListener('click', () => {
            const id = getId();
            if (!id) return (result.textContent = '번호를 입력해주세요.');

            fetch(`https://jsonplaceholder.typicode.com/posts/${id}`)
                .then(res => res.json())
                .then(data => {
                    console.log('GET 응답:', data);
                    result.textContent = JSON.stringify(data, null, 2);
                })
                .catch(err => console.log('GET 에러:', err));
        });

        // ─── CREATE (POST) ───
        document.getElementById('postBtn').addEventListener('click', () => {
            fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: '새 게시물 제목',
                    body: '새 게시물 내용',
                    userId: 1
                })
            })
                .then(res => res.json())
                .then(data => {
                    console.log('POST 응답:', data);
                    result.textContent = JSON.stringify(data, null, 2);
                })
                .catch(err => console.log('POST 에러:', err));
        });

        // ─── UPDATE (PUT) ───
        document.getElementById('putBtn').addEventListener('click', () => {
            const id = getId();
            if (!id) return (result.textContent = '번호를 입력해주세요.');

            fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: '수정된 제목',
                    body: '수정된 내용',
                    userId: 1
                })
            })
                .then(res => res.json())
                .then(data => {
                    console.log('PUT 응답:', data);
                    result.textContent = JSON.stringify(data, null, 2);
                })
                .catch(err => console.log('PUT 에러:', err));
        });

        // ─── DELETE ───
        document.getElementById('deleteBtn').addEventListener('click', () => {
            const id = getId();
            if (!id) return (result.textContent = '번호를 입력해주세요.');

            fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
                method: 'DELETE'
            })
                .then(res => {
                    console.log('DELETE 응답 status:', res.status);
                    result.textContent = `✅ ${id}번 게시물 삭제 완료 (status: ${res.status})`;
                })
                .catch(err => console.log('DELETE 에러:', err));
        });
    </script>
</body>
</html>
