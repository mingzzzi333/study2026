<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC 쇼핑몰</title>
</head>
<body>
    <h1>상품 리뷰</h1>

    <div class="product-image">
        <img src="https://picsum.photos/600/400">
    </div>

    <!-- 리뷰 작성 폼 -->
    <section class="review-form">
        <h2>후기를 작성해주세요</h2>
        <div>
            <p>평점:</p>
            <label><input type="radio" name="rating" value="1">1</label>
            <label><input type="radio" name="rating" value="2">2</label>
            <label><input type="radio" name="rating" value="3">3</label>
            <label><input type="radio" name="rating" value="4">4</label>
            <label><input type="radio" name="rating" value="5">5</label>
        </div>

        <textarea id="comment" placeholder="후기를 작성해주세요..." rows="5" cols="40"></textarea>
        <button id="send">제출</button>
    </section>

    <!-- 리뷰 영역 -->
    <section>
        <h2>리뷰</h2>
        <div id="review-container"></div>
        <div class="ai-summary">
            <p><strong>AI 요약:</strong> <span id="ai-summary-text">현재는 리뷰가 없습니다.</span></p>
            <p><strong>평균 별점:</strong> <span id="avg-rating">N/A</span></p>
        </div>
        <button id="refresh-ai">AI 요약 새로고침</button>
    </section>

    <script>
        // 리뷰 목록 불러오기
        async function loadReviews() {
            const response = await fetch('/api/reviews');
            const reviews = await response.json();

            const container = document.getElementById('review-container');
            container.innerHTML = '';

            if (reviews.length === 0) {
                container.innerHTML = '<p>아직 작성된 리뷰가 없습니다.</p>';
                return;
            }

            reviews.forEach(review => {
                const div = document.createElement('div');
                div.innerHTML = `<p>⭐ ${review.rating}점 — ${review.comment}</p>`;
                container.appendChild(div);
            });
        }

        // AI 요약 불러오기
        async function loadAiSummary() {
            document.getElementById('ai-summary-text').textContent = '요약 중...';
            const response = await fetch('/api/ai-summary');
            const data = await response.json();

            document.getElementById('ai-summary-text').textContent = data.summary;
            document.getElementById('avg-rating').textContent =
                data.average_rating !== null ? `${data.average_rating}점` : 'N/A';
        }

        // 리뷰 제출
        document.getElementById('send').addEventListener('click', async () => {
            const ratingInput = document.querySelector('input[name="rating"]:checked');
            const comment = document.getElementById('comment').value.trim();

            if (!ratingInput) return alert('평점을 선택해주세요.');
            if (!comment) return alert('후기를 작성해주세요.');

            await fetch('/api/reviews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rating: Number(ratingInput.value), comment })
            });

            // 초기화
            ratingInput.checked = false;
            document.getElementById('comment').value = '';

            await loadReviews();
            await loadAiSummary();
        });

        // AI 요약 새로고침 버튼
        document.getElementById('refresh-ai').addEventListener('click', loadAiSummary);

        // 초기 로드
        loadReviews();
        loadAiSummary();
    </script>
</body>
</html>
