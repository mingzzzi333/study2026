<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회사 이름 생성기</h1>
    <input type="text" id="userInput" placeholder="회사의 상품명을 입력하시오">
    <button id='send'>이름생성</button>
    <ul id="resultList"></ul>
<script>
    document.getElementById('send').addEventListener('click', async () => {
        // 1. 입력값 가져오기
        const userInput = document.getElementById('userInput').value;
        if (!userInput) return alert('상품명을 입력하세요.');

        // 2. 백엔드로 보내기
        const response = await fetch('/api/name', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product: userInput })
        });

        // 3. 결과 받아오기
        const data = await response.json();

        // 4. 화면에 출력
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = ''; // 이전 결과 초기화
        const li = document.createElement('li');
        li.textContent = data.chatbot;
        resultList.appendChild(li);
    });
</script>
</body>
</html>
