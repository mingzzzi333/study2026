<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fffdf7;
    --ink: #1a1410;
    --muted: #8c7b6b;
    --accent: #c84b2f;
    --accent2: #2f7ac8;
    --line: #d9cfc2;
    --done-bg: #e8e0d0;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  header {
    margin-bottom: 32px;
    position: relative;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -1px;
  }

  h1 span {
    color: var(--accent);
  }

  .date-badge {
    position: absolute;
    top: 0;
    right: 0;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.6;
  }

  /* Input area */
  .input-area {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 2px;
    padding: 16px;
    margin-bottom: 28px;
    box-shadow: 3px 3px 0 var(--ink);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-area input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    caret-color: var(--accent);
  }

  .input-area input::placeholder {
    color: var(--muted);
  }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 1px;
    transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    box-shadow: 2px 2px 0 #8c2a15;
    white-space: nowrap;
  }

  .add-btn:hover { background: #a83e26; }
  .add-btn:active { transform: translate(2px, 2px); box-shadow: none; }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
  }

  .filter-btn.active {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--paper);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .filter-btn:hover:not(.active) {
    border-color: var(--muted);
    color: var(--ink);
  }

  /* Stats */
  .stats {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    margin-left: 2px;
  }

  /* Todo list */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-left: 3px solid var(--accent2);
    border-radius: 2px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s, opacity 0.3s;
    animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .todo-item:hover {
    transform: translateX(2px);
    box-shadow: 2px 2px 0 var(--line);
  }

  .todo-item.done {
    border-left-color: var(--line);
    background: var(--done-bg);
    opacity: 0.7;
  }

  .todo-item.removing {
    animation: slideOut 0.25s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); max-height: 80px; margin-bottom: 8px; }
    to { opacity: 0; transform: translateX(20px); max-height: 0; margin-bottom: 0; padding: 0; border: none; }
  }

  /* Checkbox */
  .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink);
    border-radius: 1px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    cursor: pointer;
  }

  .todo-item.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box svg {
    display: none;
  }

  .todo-item.done .check-box svg {
    display: block;
  }

  /* Text */
  .todo-text {
    flex: 1;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.4;
    transition: all 0.2s;
    word-break: break-word;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Index number */
  .todo-index {
    font-size: 10px;
    color: var(--line);
    letter-spacing: 0.05em;
    flex-shrink: 0;
    min-width: 20px;
    text-align: right;
  }

  /* Delete btn */
  .del-btn {
    background: none;
    border: none;
    color: var(--line);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 1px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .del-btn:hover {
    color: var(--accent);
    background: #f5e8e5;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    border: 1.5px dashed var(--line);
    border-radius: 2px;
  }

  .empty-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* Clear all */
  .bottom-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .clear-btn:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 20px 0 8px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="label">// TODO LIST</span>
    <h1>오늘의 할 일<span>.</span></h1>
    <div class="date-badge" id="dateBadge"></div>
  </header>

  <div class="input-area">
    <input type="text" id="todoInput" placeholder="새로운 할 일을 입력하세요..." maxlength="80" />
    <button class="add-btn" id="addBtn">+ 추가</button>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">진행중</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="todo-list" id="todoList"></div>

  <div class="bottom-row">
    <button class="clear-btn" id="clearDoneBtn">완료된 항목 삭제</button>
  </div>
</div>

<script>
  // State
  let todos = JSON.parse(localStorage.getItem('todos_v1') || '[]');
  let filter = 'all';

  // Date
  const now = new Date();
  document.getElementById('dateBadge').innerHTML =
    `${now.getFullYear()}년<br>${now.getMonth()+1}월 ${now.getDate()}일`;

  function save() {
    localStorage.setItem('todos_v1', JSON.stringify(todos));
  }

  function updateStats() {
    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    const active = total - done;
    document.getElementById('stats').textContent =
      total === 0 ? '' : `총 ${total}개 · 완료 ${done}개 · 진행중 ${active}개`;
  }

  function getFiltered() {
    if (filter === 'active') return todos.filter(t => !t.done);
    if (filter === 'done') return todos.filter(t => t.done);
    return todos;
  }

  function render() {
    const list = document.getElementById('todoList');
    const filtered = getFiltered();
    list.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      const msgs = {
        all: ['📋', '할 일이 없어요!<br>새로운 항목을 추가해보세요.'],
        active: ['✅', '진행중인 항목이 없어요!'],
        done: ['🎉', '완료된 항목이 없어요!']
      };
      const [icon, msg] = msgs[filter];
      empty.innerHTML = `<span class="empty-icon">${icon}</span>${msg}`;
      list.appendChild(empty);
    } else {
      filtered.forEach((todo, filteredIdx) => {
        const originalIdx = todos.indexOf(todo);
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.done ? ' done' : '');
        item.dataset.id = todo.id;

        item.innerHTML = `
          <div class="check-box">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 3.5L3.8 6.5L9 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="todo-text">${escapeHTML(todo.text)}</span>
          <span class="todo-index">${String(filteredIdx + 1).padStart(2, '0')}</span>
          <button class="del-btn" title="삭제">✕</button>
        `;

        // Toggle done
        item.querySelector('.check-box').addEventListener('click', (e) => {
          e.stopPropagation();
          todo.done = !todo.done;
          save();
          render();
          updateStats();
        });

        // Delete
        item.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          item.classList.add('removing');
          setTimeout(() => {
            todos = todos.filter(t => t.id !== todo.id);
            save();
            render();
            updateStats();
          }, 240);
        });

        list.appendChild(item);
      });
    }

    updateStats();
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) {
      input.focus();
      input.style.outline = '2px solid var(--accent)';
      setTimeout(() => input.style.outline = '', 600);
      return;
    }
    todos.unshift({ id: Date.now(), text, done: false });
    save();
    input.value = '';
    input.focus();
    render();
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Events
  document.getElementById('addBtn').addEventListener('click', addTodo);
  document.getElementById('todoInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTodo();
  });

  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  document.getElementById('clearDoneBtn').addEventListener('click', () => {
    if (!todos.some(t => t.done)) return;
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  // Init
  render();
</script>
</body>
</html>
